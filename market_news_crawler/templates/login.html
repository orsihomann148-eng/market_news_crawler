<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 - 新闻资讯抓取工具</title>
  <style>
    :root{--brand:#0f766e;--brand-dark:#115e59;--bg:#f7f3ea;--line:#e5dccd;--text:#17231f;--muted:#6b7280}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
    .card{width:min(420px,calc(100vw - 32px));background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 18px 50px rgba(20,40,35,.08)}
    h1{margin:0 0 8px;font-size:24px} p{margin:0 0 18px;color:var(--muted);line-height:1.6}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:8px} input{width:100%;padding:12px;border:1px solid #d9d1c3;border-radius:12px;font:inherit}
    button{width:100%;margin-top:16px;border:0;border-radius:12px;padding:12px 16px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-weight:700;cursor:pointer}
    .error{margin:12px 0 0;color:#b91c1c;font-size:13px}.hint{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('login') }}">
    <h1>登录新闻资讯工具</h1>
    <p>请输入管理员设置的访问密码。</p>
    <input type="hidden" name="next" value="{{ next_url }}">
    <label for="password">访问密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button type="submit">登录</button>
    <div class="hint">登录后默认进入普通用户模式，可切换到开发者模式。</div>
  </form>
</body>
</html>
